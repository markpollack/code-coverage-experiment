# ── ETL command to reproduce full parquet dataset ──
#
# Legacy variants (control, variant-a, variant-b, variant-c):
#   python scripts/load_results.py --legacy
#
# All session-based variants:
#   python scripts/load_results.py \
#     --session 20260304-064326 \
#     --session 20260304-112636 \
#     --session 20260304-151741 \
#     --session 20260304-160929 \
#     --session 20260304-202451 \
#     --session 20260304-214344 \
#     --session 20260304-214537 \
#     --session 20260305-000719 \
#     --session 20260305-041144 \
#     --session 20260305-154633
#
# Note: session-based load uses last-write-wins per variant,
# so later sessions override earlier ones for the same variant.
