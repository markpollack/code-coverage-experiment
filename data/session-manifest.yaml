# Session Manifest — canonical session-to-variant mapping
#
# Each entry is the "best" session for a given variant.
# The ETL (load_results.py) should be invoked with all sessions listed here
# to produce a complete parquet dataset.
#
# Releases archive session result JSONs so the data can be reproduced
# from scratch without re-running experiments.

